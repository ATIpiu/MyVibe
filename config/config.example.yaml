llm:
  provider: openai                       # 支持所有兼容 OpenAI Chat Completions 协议的服务
  model: gpt-4o                          # 模型名称，按所用服务填写
  api_key: "YOUR_API_KEY_HERE"           # 或设置环境变量 OPENAI_API_KEY
  base_url: "https://api.openai.com/v1"  # 兼容 OpenAI 协议的任意服务地址
  max_tokens: 8192
  temperature: 1.0
  history_file: "logs/conversation_history.jsonl"

agent:
  max_tool_workers: 4
  context_compress_threshold: 0.92
  compress_keep_recent: 10
  model_routing: false               # 是否按任务类型自动切换模型，关闭则始终使用 llm.model

permissions:
  auto_allow:
    - read_file
    - search_in_file
    - git_status
    - git_diff
    - get_file_summary
    - get_function_code
    - index_project
    - search_functions
  require_confirm:
    - write_file
    - edit_file
    - shell
    - git_commit
  deny:
    - "rm -rf /"
    - "format"

shell:
  dangerous_patterns:
    - "rm -rf /"
    - ":(){ :|:& };:"
    - "dd if=/dev/zero"
    - "mkfs"
    - "> /dev/sda"
  timeout_ms: 120000

logging:
  level: INFO
  log_dir: logs
  console_colors: true

session:
  sessions_dir: .agent_sessions
  cache_dir: .agent_cache
